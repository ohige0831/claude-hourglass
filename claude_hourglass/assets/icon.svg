<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Claude Hourglass</title>

  <!-- Outer hourglass silhouette (dark charcoal frame) -->
  <polygon points="2,1 30,1 17,14 17,18 30,31 2,31 15,18 15,14"
           fill="#2A2520"/>

  <!-- Top half: cream sand (remaining capacity) ~60% fill at "40% used" state -->
  <polygon points="5,4 27,4 20,9.4 12,9.4" fill="#DDD5B8"/>

  <!-- Bottom half: amber/orange sand (consumed capacity) ~40% fill -->
  <polygon points="9,24.4 23,24.4 27,28 5,28" fill="#C4782A"/>

  <!-- Waist: dark amber drip at the neck -->
  <rect x="15" y="13" width="2" height="6" fill="#A05818"/>
</svg>
